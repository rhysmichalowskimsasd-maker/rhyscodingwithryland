<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Player 2D Bed Wars</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }
        canvas {
            box-shadow: 0px 10px 40px rgba(0,0,0,0.8);
            background-color: #161b22;
        }
        #hud-container {
            position: absolute;
            top: 15px;
            width: 930px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .player-panel {
            background: rgba(22, 27, 34, 0.85);
            border: 2px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            color: white;
            width: 220px;
            text-shadow: 1px 1px 2px black;
        }
        .p1-title { color: #58a6ff; font-weight: bold; font-size: 18px; margin: 0 0 6px 0; }
        .p2-title { color: #56d364; font-weight: bold; font-size: 18px; margin: 0 0 6px 0; }
        .stat { display: flex; justify-content: space-between; font-size: 13px; margin: 3px 0; }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- Blue Player HUD -->
        <div class="player-panel">
            <h3 class="p1-title">🔵 Player 1 (Blue)</h3>
            <div class="stat">Controls: <span><b>W, A, D</b></span></div>
            <div class="stat">Bed Status: <span id="p1Bed" style="color:#56d364; font-weight:bold;">❤️ ALIVE</span></div>
            <div class="stat">Kills: <span id="p1Kills">0</span></div>
        </div>

        <!-- Green Player HUD -->
        <div class="player-panel">
            <h3 class="p2-title">🟢 Player 2 (Green)</h3>
            <div class="stat">Controls: <span><b>Arrows</b></span></div>
            <div class="stat">Bed Status: <span id="p2Bed" style="color:#56d364; font-weight:bold;">❤️ ALIVE</span></div>
            <div class="stat">Kills: <span id="p2Kills">0</span></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const BLOCK_SIZE = 32; 
        const WORLD_COLS = 30; // Compact map width for quick tactical matches
        const WORLD_ROWS = 17;

        // Block Type Legend Dictionary
        const COLORS = {
            0: "transparent",
            1: "#21262d", // Hard Base Island Rock
            2: "#1f6feb", // Player 1 Wool Platform (Blue)
            3: "#238636", // Player 2 Wool Platform (Green)
            4: "#ff7b72", // Player 1 Bed Node
            5: "#7ee787"  // Player 2 Bed Node
        };

        const world = [];
        for (let r = 0; r < WORLD_ROWS; r++) {
            world[r] = [];
            for (let c = 0; c < WORLD_COLS; c++) world[r][c] = 0;
        }

        // Generate Player 1 Island (Left Side)
        for (let r = 11; r <= 13; r++) {
            for (let c = 1; c <= 5; c++) world[r][c] = 1;
        }
        world[10][2] = 4; // Place Blue Bed

        // Generate Player 2 Island (Right Side)
        for (let r = 11; r <= 13; r++) {
            for (let c = 24; c <= 28; c++) world[r][c] = 1;
        }
        world[10][27] = 5; // Place Green Bed
        const p1 = {
            id: 1,
            x: 64, y: 200,
            width: 20, height: 38,
            vx: 0, vy: 0,
            speed: 4, gravity: 0.35, jumpForce: -8.5,
            grounded: false, bedAlive: true, kills: 0,
            spawnX: 64, spawnY: 200, blockType: 2
        };

        const p2 = {
            id: 2,
            x: 870, y: 200,
            width: 20, height: 38,
            vx: 0, vy: 0,
            speed: 4, gravity: 0.35, jumpForce: -8.5,
            grounded: false, bedAlive: true, kills: 0,
            spawnX: 870, spawnY: 200, blockType: 3
        };

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        const p1BedText = document.getElementById("p1Bed");
        const p2BedText = document.getElementById("p2Bed");
        const p1KillsText = document.getElementById("p1Kills");
        const p2KillsText = document.getElementById("p2Kills");
        // Auto-Bridge module to automatically build under-foot blocks
        function autoPlaceBlocks(player) {
            const centerX = player.x + player.width / 2;
            const bottomY = player.y + player.height + 2;

            const c = Math.floor(centerX / BLOCK_SIZE);
            const r = Math.floor(bottomY / BLOCK_SIZE);

            if (r >= 0 && r < WORLD_ROWS && c >= 0 && c < WORLD_COLS) {
                // If walking over empty space, instantly drop team color block
                if (world[r][c] === 0) {
                    world[r][c] = player.blockType;
                }
            }
        }

        // Simple bounding box checks to trigger combat or bed destructions
        function checkPlayerCombat() {
            // Check if Player 1 steps on Player 2's Green Bed
            let p1ColC = Math.floor((p1.x + p1.width/2) / BLOCK_SIZE);
            let p1RowR = Math.floor((p1.y + p1.height/2) / BLOCK_SIZE);
            if (world[p1RowR][p1ColC] === 5) {
                world[p1RowR][p1ColC] = 0; // Bed broken!
                p2.bedAlive = false;
                p2BedText.textContent = "❌ DESTROYED";
                p2BedText.style.color = "#ff7b72";
            }

            // Check if Player 2 steps on Player 1's Blue Bed
            let p2ColC = Math.floor((p2.x + p2.width/2) / BLOCK_SIZE);
            let p2RowR = Math.floor((p2.y + p2.height/2) / BLOCK_SIZE);
            if (world[p2RowR][p2ColC] === 4) {
                world[p2RowR][p2ColC] = 0; // Bed broken!
                p1.bedAlive = false;
                p1BedText.textContent = "❌ DESTROYED";
                p1BedText.style.color = "#ff7b72";
            }

            // Sword fight calculation: check if player avatars overlap
            if (p1.x < p2.x + p2.width && p1.x + p1.width > p2.x &&
                p1.y < p2.y + p2.height && p1.y + p1.height > p2.y) {
                // The player moving faster horizontally knocks out the other
                if (Math.abs(p1.vx) > Math.abs(p2.vx)) {
                    killPlayer(p2, p1);
                } else if (Math.abs(p2.vx) > Math.abs(p1.vx)) {
                    killPlayer(p1, p2);
                }
            }
        }
        function checkCollision(px, py, player) {
            const left = Math.floor(px / BLOCK_SIZE);
            const right = Math.floor((px + player.width) / BLOCK_SIZE);
            const top = Math.floor(py / BLOCK_SIZE);
            const bottom = Math.floor((py + player.height) / BLOCK_SIZE);

            for (let r = top; r <= bottom; r++) {
                for (let c = left; c <= right; c++) {
                    if (r >= 0 && r < WORLD_ROWS && c >= 0 && c < WORLD_COLS) {
                        if (world[r][c] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function updatePlayerPhysics(p, leftKey, rightKey, upKey) {
            p.vx = 0;
            if (keys[leftKey]) p.vx = -p.speed;
            if (keys[rightKey]) p.vx = p.speed;

            p.x += p.vx;
            if (checkCollision(p.x, p.y, p)) p.x -= p.vx;

            p.vy += p.gravity;
            if (keys[upKey] && p.grounded) {
                p.vy = p.jumpForce;
                p.grounded = false;
            }

            p.y += p.vy;
            if (checkCollision(p.x, p.y, p)) {
                if (p.vy > 0) p.grounded = true;
                p.y -= p.vy;
                p.vy = 0;
            } else {
                p.grounded = false;
            }

            // Map Edge Constraints
            if (p.x < 0) p.x = 0;
            if (p.x + p.width > canvas.width) p.x = canvas.width - p.width;

            // Void Elimination Trigger
            if (p.y > canvas.height) {
                killPlayer(p, null);
            }
        }
        function killPlayer(victim, attacker) {
            if (attacker) {
                attacker.kills++;
                p1KillsText.textContent = p1.kills;
                p2KillsText.textContent = p2.kills;
            }

            if (!victim.bedAlive) {
                alert(`GAME OVER! Player ${victim.id === 1 ? '2 (Green)' : '1 (Blue)'} wins the match!`);
                location.reload();
            } else {
                victim.x = victim.spawnX;
                victim.y = victim.spawnY;
                victim.vx = 0; victim.vy = 0;
            }
        }

        function gameLoop() {
            // Run physics states for both players independently
            updatePlayerPhysics(p1, "KeyA", "KeyD", "KeyW");
            updatePlayerPhysics(p2, "ArrowLeft", "ArrowRight", "ArrowUp");

            // Deploy auto-bridging blocks under foot coordinates
            autoPlaceBlocks(p1);
            autoPlaceBlocks(p2);

            checkPlayerCombat();

            // Clear Scene Canvas Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Base Islands & Placed Bridging Tiles
            for (let r = 0; r < WORLD_ROWS; r++) {
                for (let c = 0; c < WORLD_COLS; c++) {
                    const type = world[r][c];
                    if (type !== 0) {
                        ctx.fillStyle = COLORS[type];
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        
                        // Add visible block frame accents
                        ctx.strokeStyle = "rgba(0,0,0,0.3)";
                        ctx.strokeRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }

            // Draw Player 1 (Blue Character Model)
            ctx.fillStyle = "#58a6ff";
            ctx.fillRect(p1.x, p1.y, p1.width, p1.height);

            // Draw Player 2 (Green Character Model)
            ctx.fillStyle = "#56d364";
            ctx.fillRect(p2.x, p2.y, p2.width, p2.height);

            requestAnimationFrame(gameLoop);
        }

        // Run Match Framework
        gameLoop();
    </script>
    
</body>
</html>
