<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 2D HTML Minecraft</title>
    <style>
        body {
            margin: 0;
            background-color: #0b1d3a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            background-color: #4ba3e3;
            transition: filter 0.3s;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        h2 { margin: 0; font-size: 24px; letter-spacing: 1px; color: #f1c40f; }
        p { margin: 0; font-size: 14px; opacity: 0.9; }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            pointer-events: auto;
            transition: all 0.2s;
        }
        button:hover { background: white; color: black; transform: scale(1.05); }
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 6px;
            border: 2px solid #333;
            gap: 6px;
        }
        .slot {
            width: 40px;
            height: 40px;
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
            border-radius: 4px;
        }
        .slot.active {
            border-color: #f1c40f;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px #f1c40f;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>MINECRAFT 2D PRO</h2>
        <p><b>A / D / Space</b>: Move & Jump</p>
        <p><b>Left Click</b>: Break Block</p>
        <p><b>Right Click</b>: Place Selected Block</p>
        <p><b>Keys 1, 2, 3</b>: Change Selected Block</p>
    </div>

    <div id="hotbar">
        <div class="slot active" id="slot-1" style="background-color: #557a2b;">1</div>
        <div class="slot" id="slot-2" style="background-color: #866043;">2</div>
        <div class="slot" id="slot-3" style="background-color: #737373;">3</div>
    </div>

    <div class="controls">
        <button id="fullscreenBtn">Toggle Fullscreen</button>
    </div>

    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const fullscreenBtn = document.getElementById("fullscreenBtn");

        // Game World Configuration
        const BLOCK_SIZE = 40;
        const WORLD_COLS = 150; 
        const WORLD_ROWS = 40;
        
        const COLORS = {
            0: "transparent", 
            1: "#557a2b", // Grass
            2: "#866043", // Dirt
            3: "#737373"  // Stone
        };

        let selectedBlock = 1;

        // Player Physical Attributes
        const player = {
            x: 400,
            y: 100,
            width: 24,
            height: 44,
            vx: 0,
            vy: 0,
            speed: 5,
            gravity: 0.4,
            jumpForce: -9.5,
            grounded: false
        };

        // Smooth Camera Tracker
        const camera = { x: 0, y: 0 };
        const keys = {};

        // Generate Procedural Landscape Map Matrix
        const world = [];
        for (let r = 0; r < WORLD_ROWS; r++) {
            world[r] = [];
            for (let c = 0; c < WORLD_COLS; c++) {
                let surfaceHeight = Math.floor(15 + Math.sin(c * 0.15) * 4 + Math.cos(c * 0.05) * 2);
                
                if (r > surfaceHeight + 4) {
                    world[r][c] = 3; // Stone base layers
                } else if (r > surfaceHeight) {
                    world[r][c] = 2; // Dirt block layers
                } else if (r === surfaceHeight) {
                    world[r][c] = 1; // Top surface grass
                } else {
                    world[r][c] = 0; // Empty atmospheric air
                }
            }
        }
        // Keyboard Listener Core Matrix
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (e.key === "1") switchBlock(1);
            if (e.key === "2") switchBlock(2);
            if (e.key === "3") switchBlock(3);
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        function switchBlock(id) {
            selectedBlock = id;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`slot-${id}`).classList.add('active');
        }

        // Mouse Breaking and Placing Engine
        canvas.addEventListener("contextmenu", e => e.preventDefault());
        canvas.addEventListener("mousedown", e => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX + camera.x;
            const mouseY = (e.clientY - rect.top) * scaleY + camera.y;

            const c = Math.floor(mouseX / BLOCK_SIZE);
            const r = Math.floor(mouseY / BLOCK_SIZE);

            if (r >= 0 && r < WORLD_ROWS && c >= 0 && c < WORLD_COLS) {
                if (e.button === 0) {
                    world[r][c] = 0; // Destroy block on Left Click
                } else if (e.button === 2) {
                    if (world[r][c] === 0) world[r][c] = selectedBlock; // Build block on Right Click
                }
            }
        });

        // Fullscreen Scaling Control Engine
        fullscreenBtn.addEventListener("click", () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        function resizeCanvas() {
            if (document.fullscreenElement) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            } else {
                canvas.width = 960;
                canvas.height = 540;
            }
        }
        window.addEventListener("resize", resizeCanvas);
        document.addEventListener("fullscreenchange", resizeCanvas);
        // Standard AABB Block Intersect Matrix Collision Checking
        function checkCollision(px, py) {
            const left = Math.floor(px / BLOCK_SIZE);
            const right = Math.floor((px + player.width) / BLOCK_SIZE);
            const top = Math.floor(py / BLOCK_SIZE);
            const bottom = Math.floor((py + player.height) / BLOCK_SIZE);

            for (let r = top; r <= bottom; r++) {
                for (let c = left; c <= right; c++) {
                    if (r >= 0 && r < WORLD_ROWS && c >= 0 && c < WORLD_COLS) {
                        if (world[r][c] !== 0) return true;
                    }
                }
            }
            return false;
        }

        // Automatic Infinite Block Bridging Mechanics Module
        function autoPlaceBlocksUnderPlayer() {
            const playerCenterX = player.x + player.width / 2;
            const playerBottomY = player.y + player.height + 2; 

            const c = Math.floor(playerCenterX / BLOCK_SIZE);
            const r = Math.floor(playerBottomY / BLOCK_SIZE);

            // Generates an infinite safety platform trail while exploring air pockets
            if (r >= 0 && r < WORLD_ROWS && c >= 0 && c < WORLD_COLS) {
                if (world[r][c] === 0) {
                    world[r][c] = 2; // Drops infinite dirt under character foot vectors
                }
            }
        }
        // Core Physics Calculation State Engine Loop
        function update() {
            // Horizontal Speed Calculations
            player.vx = 0;
            if (keys["KeyA"] || keys["ArrowLeft"]) player.vx = -player.speed;
            if (keys["KeyD"] || keys["ArrowRight"]) player.vx = player.speed;

            player.x += player.vx;
            if (checkCollision(player.x, player.y)) player.x -= player.vx;

            // Gravity Constants and Vertical Jumping Inputs
            player.vy += player.gravity;
            if ((keys["KeyW"] || keys["Space"] || keys["ArrowUp"]) && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            player.y += player.vy;
            if (checkCollision(player.x, player.y)) {
                if (player.vy > 0) player.grounded = true;
                player.y -= player.vy;
                player.vy = 0;
            } else {
                player.grounded = false;
            }

            // Map Bounds Boundaries Locks
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > WORLD_COLS * BLOCK_SIZE) player.x = WORLD_COLS * BLOCK_SIZE - player.width;

            // Run the block auto-placement engine
            autoPlaceBlocksUnderPlayer();

            // Smooth Interpolated Fluid Camera Calculations
            camera.x += ((player.x - canvas.width / 2) - camera.x) * 0.1;
            camera.y += ((player.y - canvas.height / 2) - camera.y) * 0.1;

            if (camera.x < 0) camera.x = 0;
            if (camera.x > WORLD_COLS * BLOCK_SIZE - canvas.width) camera.x = WORLD_COLS * BLOCK_SIZE - canvas.width;
            if (camera.y < 0) camera.y = 0;
            if (camera.y > WORLD_ROWS * BLOCK_SIZE - canvas.height) camera.y = WORLD_ROWS * BLOCK_SIZE - canvas.height;
            // Main Render Layer Frame Processing
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sky Background Linear Gradient Effect
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#1a4a75");
            skyGrad.addColorStop(1, "#4ba3e3");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Visible Blocks Field Culling Viewport Rendering Optimizer
            for (let r = 0; r < WORLD_ROWS; r++) {
                for (let c = 0; c < WORLD_COLS; c++) {
                    const blockType = world[r][c];
                    if (blockType !== 0) {
                        let bx = c * BLOCK_SIZE;
                        let by = r * BLOCK_SIZE;

                        if (bx + BLOCK_SIZE > camera.x && bx < camera.x + canvas.width &&
                            by + BLOCK_SIZE > camera.y && by < camera.y + canvas.height) {
                            
                            ctx.fillStyle = COLORS[blockType];
                            ctx.fillRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);

                            // Texture Detailing Layer
                            if (blockType === 1) { // Grass top accent highlights
                                ctx.fillStyle = "#7db13b";
                                ctx.fillRect(bx, by, BLOCK_SIZE, 6);
                            }
                            if (blockType === 2) { // Dirt noise pixel detailing
                                ctx.fillStyle = "#6d4c33";
                                ctx.fillRect(bx + 8, by + 12, 6, 6);
                                ctx.fillRect(bx + 24, by + 26, 6, 6);
                            }
                            
                            // Wireframe Grid Layout Accents
                            ctx.strokeStyle = "rgba(0,0,0,0.12)";
                            ctx.lineWidth = 1;
                            ctx.strokeRect(bx, by, BLOCK_SIZE, BLOCK_SIZE);
                        }
                    }
                }
            }

            // Render Player Avatar (Steve Custom Multi-Node Model Layout)
            ctx.fillStyle = "#e0a080"; // Flesh Head
            ctx.fillRect(player.x + 4, player.y, 16, 12);
            ctx.fillStyle = "#22a6b3"; // Teal Torso
            ctx.fillRect(player.x, player.y + 12, player.width, 20);
            ctx.fillStyle = "#30336b"; // Navy Blue Legs
            ctx.fillRect(player.x + 2, player.y + 32, player.width - 4, 12);

            ctx.restore();
            requestAnimationFrame(update);
        }

        // Initialize Core Engine Startup
        update();
    </script>
</body>
</html>
