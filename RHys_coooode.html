<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceman Game</title>
<style>
  body {
    background-color: #0d1b2a;
    color: #e0fbfc;
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
    overflow: hidden;
  }
  h1 { color: #48cae4; font-size: 3em; margin: 10px; text-shadow: 0 0 10px #0077b6; }
  .instructions { font-size: 1.2em; color: #90e0ef; margin-bottom: 20px; }
  .stats-box {
    background-color: #03045e;
    border: 4px solid #00b4d8;
    border-radius: 15px;
    display: inline-block;
    padding: 15px 30px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px #00b4d8;
  }
  .stat { font-size: 1.5em; font-weight: bold; margin: 0 15px; color: #fff; }
  #score { color: #90e0ef; }
  #timer { color: #f4a261; }
  #game-area {
    position: relative;
    width: 100%;
    max-width: 600px;
    height: 400px;
    margin: 0 auto;
    border: 5px dashed #48cae4;
    border-radius: 10px;
    background: linear-gradient(to bottom, rgba(72,202,228,0.1), #03045e);
    overflow: hidden;
  }
  #iceman {
    position: absolute;
    width: 80px;
    height: 120px;
    background: #0077b6;
    border-radius: 20px 20px 5px 5px;
    border: 3px solid #caf0f8;
    cursor: pointer;
    box-shadow: inset 0 0 10px #caf0f8, 0 0 15px #0096c7;
    transition: transform 0.1s;
    user-select: none;
  }
  #iceman::before {
    content: '';
    position: absolute;
    top: -20px;
    left: 20px;
    width: 40px;
    height: 40px;
    background: #caf0f8;
    border-radius: 50%;
    box-shadow: inset 0 0 5px #0077b6;
  }
  .arm {
    position: absolute;
    top: 30px;
    width: 15px;
    height: 60px;
    background: #0077b6;
    border-radius: 10px;
    box-shadow: 0 0 5px #0096c7;
  }
  #arm-l { left: -15px; transform: rotate(20deg); }
  #arm-r { right: -15px; transform: rotate(-20deg); }
  .message {
    font-size: 2em;
    font-weight: bold;
    margin-top: 20px;
    color: #e63946;
    text-shadow: 0 0 10px #ff4d4d;
  }
</style>
</head>
<body>

<h1>ICEMAN CLICKER</h1>
<p class="instructions">Click Iceman as fast as you can to keep him frozen!</p>

<div class="stats-box">
  <span class="stat">FROST: <span id="score">0</span></span>
  <span class="stat">TIME: <span id="timer">10</span>s</span>
</div>

<div id="game-area">
  <div id="iceman" onclick="clickIceman()">
    <div class="arm" id="arm-l"></div>
    <div class="arm" id="arm-r"></div>
  </div>
</div>

<div class="message" id="game-over-text"></div>

<script>
  let score = 0;
  let timeLeft = 10;
  let gameInterval;
  let gameActive = false;

  const iceman = document.getElementById('iceman');
  const scoreDisplay = document.getElementById('score');
  const timerDisplay = document.getElementById('timer');
  const gameArea = document.getElementById('game-area');
  const gameOverText = document.getElementById('game-over-text');

  function startGame() {
    score = 0;
    timeLeft = 10;
    gameActive = true;
    scoreDisplay.innerText = score;
    timerDisplay.innerText = timeLeft;
    gameOverText.innerText = '';
    iceman.style.display = 'block';
    moveIceman();

    gameInterval = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = timeLeft;
      
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  function clickIceman() {
    if (!gameActive) {
      startGame();
      return;
    }

    score++;
    scoreDisplay.innerText = score;

    // Shake effect
    iceman.style.transform = 'scale(1.1) rotate(' + (Math.random() * 20 - 10) + 'deg)';
    setTimeout(() => {
      iceman.style.transform = 'scale(1)';
    }, 100);

    moveIceman();
  }

  function moveIceman() {
    const areaWidth = gameArea.clientWidth;
    const areaHeight = gameArea.clientHeight;
    const icemanWidth = iceman.clientWidth;
    const icemanHeight = iceman.clientHeight;

    const randomX = Math.floor(Math.random() * (areaWidth - icemanWidth));
    const randomY = Math.floor(Math.random() * (areaHeight - icemanHeight));

    iceman.style.left = randomX + 'px';
    iceman.style.top = randomY + 'px';
  }

  function endGame() {
    gameActive = false;
    clearInterval(gameInterval);
    iceman.style.display = 'none';
    gameOverText.innerText = 'ICE MELTED! Final Frost: ' + score;
    
    setTimeout(() => {
      gameOverText.innerText += '\nClick Iceman to Restart!';
    }, 500);
  }
  
  // Initialize
  endGame();
</script>

</body>
</html>
