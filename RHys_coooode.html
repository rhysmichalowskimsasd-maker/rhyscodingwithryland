<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-NEXUS // Cyberpunk Command Center</title>
    <style>
        /* --- CORE DESIGN SYSTEM & VARIABLES --- */
        :root {
            --bg-deep: #0a0a12;
            --bg-surface: #121225;
            --bg-card: #181832;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0055;
            --neon-green: #39ff14;
            --neon-yellow: #ffe600;
            --text-main: #e2e2ec;
            --text-muted: #7a7a9a;
            --font-cyber: 'Courier New', Courier, monospace;
            --glitch-transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* --- GLOBAL RESET & SCROLLBAR --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-cyber);
            overflow-x: hidden;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 3px;
        }

        /* --- BACKGROUND CANVAS ANIMATION --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15;
        }

        /* --- GLITCH FX ANIMATION --- */
        @keyframes cyber-glitch {
            0% { clip-path: inset(40% 0 61% 0); transform: skew(0.3deg); }
            20% { clip-path: inset(92% 0 1% 0); transform: skew(-0.5deg); }
            40% { clip-path: inset(15% 0 80% 0); transform: skew(0.5deg); }
            60% { clip-path: inset(80% 0 5% 0); transform: skew(-0.3deg); }
            80% { clip-path: inset(3% 0 92% 0); transform: skew(0.8deg); }
            100% { clip-path: inset(40% 0 61% 0); transform: skew(0deg); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- INTERFACE CONTAINER --- */
        .app-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        /* SCANLINE OVERLAY EFFECT */
        .app-container::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- HEADER NAVIGATION UI --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
            position: relative;
        }

        .brand-title::after {
            content: 'SYSTEM_ONLINE';
            position: absolute;
            bottom: -15px;
            left: 0;
            font-size: 0.6rem;
            color: var(--neon-green);
            letter-spacing: 2px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 8px 16px;
            cursor: pointer;
            font-family: var(--font-cyber);
            text-transform: uppercase;
            font-weight: bold;
            transition: var(--glitch-transition);
        }

        .tab-btn.active, .tab-btn:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        /* --- METRICS HUD OVERVIEW --- */
        .hud-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .hud-card {
            background: var(--bg-surface);
            border-left: 4px solid var(--neon-magenta);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            position: relative;
            overflow: hidden;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        .hud-card.cyan-theme { border-left-color: var(--neon-cyan); }
        .hud-card.green-theme { border-left-color: var(--neon-green); }
        .hud-card.yellow-theme { border-left-color: var(--neon-yellow); }

        .hud-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 30px; height: 30px;
            background: linear-gradient(45deg, transparent 45%, var(--text-muted) 50%, transparent 55%);
            opacity: 0.2;
        }

        .hud-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 5px;
            color: #fff;
        }

        /* --- DASHBOARD TABS PAGES --- */
        .tab-content {
            display: none;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .tab-content.active-content {
            display: grid;
        }

        @media (max-width: 900px) {
            .tab-content { grid-template-columns: 1fr; }
        }

        /* --- GENERAL CARD WRAPPERS --- */
        .panel {
            background-color: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 4px;
            position: relative;
        }

        .panel-header {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--neon-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(0, 243, 255, 0.2);
            padding-bottom: 8px;
        }

        /* --- MODULE: INTERACTIVE DATA MATRIX GRID --- */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 6px;
            margin-bottom: 15px;
        }

        .matrix-node {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .matrix-node:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 12px var(--neon-cyan);
            transform: scale(1.1);
        }

        .matrix-node.active-node {
            background: rgba(57, 255, 20, 0.15);
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        /* --- MODULE: REAL-TIME CONSOLE LOGGER --- */
        .terminal-log {
            background-color: #05050d;
            border: 1px solid #1a1a3a;
            border-radius: 4px;
            height: 250px;
            padding: 12px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: var(--neon-green);
            line-height: 1.5;
        }

        .log-entry::before {
            content: "[SYS_MSG] > ";
            color: var(--neon-magenta);
        }

        .log-entry.warn::before {
            content: "[WARNING] > ";
            color: var(--neon-yellow);
        }

        /* --- MODULE: STATUS CONTROL PANEL --- */
        .control-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
        }

        /* CSS Toggles Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
