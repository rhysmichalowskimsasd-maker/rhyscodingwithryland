<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Craft 2D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        canvas {
            display: block;
            background: #70a5ff; /* Sky color */
        }

        /* --- UI OVERLAYS --- */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }

        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0,0,0,0.7);
            padding: 6px;
            border-radius: 4px;
            border: 2px solid #555;
            gap: 5px;
        }

        .hotbar-slot {
            width: 44px;
            height: 44px;
            border: 2px solid #333;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .hotbar-slot.selected {
            border-color: #fff;
            background: #444;
        }

        .slot-preview {
            width: 24px;
            height: 24px;
        }

        .slot-key {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: #aaa;
        }

        #instructions {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        
        <div id="hud">
            <div>POS: X: <span id="pos-x">0</span>, Y: <span id="pos-y">0</span></div>
            <div>BLOCKS BROKEN: <span id="score-break">0</span></div>
        </div>

        <div id="instructions">
            [A][D] - Move Left/Right<br>
            [SPACE] - Jump<br>
            [Left Click] - Mine Block<br>
            [Right Click] - Place Block<br>
            [1-4] - Select Hotbar Item
        </div>

        <div id="hotbar">
            <div class="hotbar-slot selected" data-block="1">
                <span class="slot-key">1</span>
                <div class="slot-preview" style="background: #5c3a21; border-top: 6px solid #4caf50;"></div>
            </div>
            <div class="hotbar-slot" data-block="2">
                <span class="slot-key">2</span>
                <div class="slot-preview" style="background: #5c3a21;"></div>
            </div>
            <div class="hotbar-slot" data-block="3">
                <span class="slot-key">3</span>
                <div class="slot-preview" style="background: #737373;"></div>
            </div>
            <div class="hotbar-slot" data-block="4">
                <span class="slot-key">4</span>
                <div class="slot-preview" style="background: #a0764c; border: 2px dashed #6d4c2b;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- GAME CONFIGURATION ---
        const BLOCK_SIZE = 32;
        const WORLD_WIDTH = 120; // total blocks wide
        const WORLD_HEIGHT = 30; // total blocks deep
        const GRAVITY = 0.5;

        // Block IDs and Colors
        const BLOCKS = {
            0: { name: "Air", color: null },
            1: { name: "Grass", color: "#4caf50", topColor: "#4caf50" },
            2: { name: "Dirt", color: "#5c3a21" },
            3: { name: "Stone", color: "#737373" },
            4: { name: "Wood Planks", color: "#a0764c" }
        };

        // --- STATE MANAGEMENT ---
        let world = [];
        let blocksBroken = 0;
        let selectedBlockType = 1; // Default to grass/dirt

        const player = {
            x: (WORLD_WIDTH * BLOCK_SIZE) / 2,
            y: 0,
            width: 22,
            height: 54,
            vx: 0,
            vy: 0,
            speed: 4,
            jumpForce: 10,
            grounded: false
        };

        const camera = {
            x: 0,
            y: 0
        };

        const keys = {};

        // --- MAP GENERATION (Perlin-like basic sine terrain) ---
        function generateWorld() {
            for (let x = 0; x < WORLD_WIDTH; x++) {
                world[x] = [];
                // Generate a rolling surface height line
                let surfaceY = Math.floor(12 + Math.sin(x * 0.15) * 3 + Math.cos(x * 0.05) * 2);
                
                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    if (y < surfaceY) {
                        world[x][y] = 0; // Air
                    } else if (y === surfaceY) {
                        world[x][y] = 1; // Grass
                    } else if (y > surfaceY && y < surfaceY + 4) {
                        world[x][y] = 2; // Dirt
                    } else {
                        world[x][y] = 3; // Stone
                    }
                }
            }
            // Spawn player safely slightly above surface level
            const spawnXBlock = Math.floor(WORLD_WIDTH / 2);
            let spawnYBlock = 0;
            while(world[spawnXBlock][spawnYBlock] === 0) {
                spawnYBlock++;
            }
            player.x = spawnXBlock * BLOCK_SIZE;
            player.y = (spawnYBlock - 3) * BLOCK_SIZE;
        }

        // --- INTERACTION HANDLING ---
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (["Digit1", "Digit2", "Digit3", "Digit4"].includes(e.code)) {
                const index = e.code.replace("Digit", "");
                setActiveSlot(index);
            }
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        // Prevent right click menu on game canvas
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left + camera.x;
            const clickY = e.clientY - rect.top + camera.y;

            const blockX = Math.floor(clickX / BLOCK_SIZE);
            const blockY = Math.floor(clickY / BLOCK_SIZE);

            if (blockX < 0 || blockX >= WORLD_WIDTH || blockY < 0 || blockY >= WORLD_HEIGHT) return;

            if (e.button === 0) { 
                // Left Click: Break Block
                if (world[blockX][blockY] !== 0) {
                    world[blockX][blockY] = 0;
                    blocksBroken++;
                    document.getElementById("score-break").innerText = blocksBroken;
                }
            } else if (e.button === 2) { 
                // Right Click: Place Block
                // Check that it's replacing air, and doesn't overlap the player
                if (world[blockX][blockY] === 0) {
                    const blockLeft = blockX * BLOCK_SIZE;
                    const blockRight = blockLeft + BLOCK_SIZE;
                    const blockTop = blockY * BLOCK_SIZE;
                    const blockBottom = blockTop + BLOCK_SIZE;

                    const intersectsPlayer = (
                        player.x < blockRight &&
                        player.x + player.width > blockLeft &&
                        player.y < blockBottom &&
                        player.y + player.height > blockTop
                    );

                    if (!intersectsPlayer) {
                        world[blockX][blockY] = selectedBlockType;
                    }
                }
            }
        });

        function setActiveSlot(num) {
            document.querySelectorAll('.hotbar-slot').forEach(slot => slot.classList.remove('selected'));
            const activeSlot = document.querySelector(`.hotbar-slot[data-block="${num}"]`);
            if (activeSlot) {
                activeSlot.classList.add('selected');
                selectedBlockType = parseInt(num);
            }
        }

        // Click hotbar slots directly
        document.querySelectorAll('.hotbar-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                setActiveSlot(slot.getAttribute('data-block'));
            });
        });

        // --- PHYSICAL COLLISION LOGIC ---
        function checkBlockCollision(x, y) {
            const blockX = Math.floor(x / BLOCK_SIZE);
            const blockY = Math.floor(y / BLOCK_SIZE);

            if (blockX < 0 || blockX >= WORLD_WIDTH || blockY < 0 || blockY >= WORLD_HEIGHT) {
                return true; // Boundaries behave solid
            }
            return world[blockX][blockY] !== 0;
        }

        function updatePhysics() {
            // Apply Movement Input
            if (keys["KeyA"] || keys["ArrowLeft"]) player.vx = -player.speed;
